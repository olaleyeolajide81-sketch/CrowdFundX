name: Deploy to Production

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    
    services:
      mongodb:
        image: mongo:7.0
        env:
          MONGO_INITDB_ROOT_USERNAME: admin
          MONGO_INITDB_ROOT_PASSWORD: password
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --eval 'db.runCommand({ping: 1})'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      
      redis:
        image: redis:7.2-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'
        cache-dependency-path: |
          frontend/package-lock.json
          backend/package-lock.json

    - name: Install backend dependencies
      run: |
        cd backend
        npm ci

    - name: Install frontend dependencies
      run: |
        cd frontend
        npm ci

    - name: Run backend tests
      run: |
        cd backend
        npm test
      env:
        MONGODB_URI: mongodb://admin:password@localhost:27017/crowdfundx_test?authSource=admin
        REDIS_URL: redis://localhost:6379
        NODE_ENV: test

    - name: Run frontend tests
      run: |
        cd frontend
        npm test -- --coverage --watchAll=false

    - name: Run smart contract tests
      run: |
        cd smart-contracts
        cargo test

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: test
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Run Trivy vulnerability scanner
      uses: aquasecurity/trivy-action@master
      with:
        scan-type: 'fs'
        scan-ref: '.'
        format: 'sarif'
        output: 'trivy-results.sarif'

    - name: Upload Trivy scan results
      uses: github/codeql-action/upload-sarif@v2
      with:
        sarif_file: 'trivy-results.sarif'

    - name: Run npm audit
      run: |
        cd frontend && npm audit --audit-level high
        cd ../backend && npm audit --audit-level high

  build-and-push:
    name: Build and Push Images
    runs-on: ubuntu-latest
    needs: [test, security-scan]
    if: github.ref == 'refs/heads/main'
    
    strategy:
      matrix:
        component: [frontend, backend]
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Log in to Container Registry
      uses: docker/login-action@v3
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Extract metadata
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/${{ matrix.component }}
        tags: |
          type=ref,event=branch
          type=ref,event=pr
          type=sha,prefix={{branch}}-
          type=raw,value=latest,enable={{is_default_branch}}

    - name: Build and push Docker image
      uses: docker/build-push-action@v5
      with:
        context: .
        file: ./docker/Dockerfile.${{ matrix.component }}
        push: true
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        cache-from: type=gha
        cache-to: type=gha,mode=max
        platforms: linux/amd64,linux/arm64

  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.ref == 'refs/heads/main'
    environment: staging
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup kubectl
      uses: azure/setup-kubectl@v3
      with:
        version: 'v1.28.0'

    - name: Configure kubectl
      run: |
        echo "${{ secrets.KUBE_CONFIG_STAGING }}" | base64 -d > kubeconfig
        export KUBECONFIG=kubeconfig

    - name: Deploy to staging
      run: |
        export KUBECONFIG=kubeconfig
        
        # Create namespace if it doesn't exist
        kubectl create namespace crowdfundx-staging --dry-run=client -o yaml | kubectl apply -f -
        
        # Apply configurations
        envsubst < kubernetes/deployment.yml | kubectl apply -f - -n crowdfundx-staging
        
        # Wait for deployment
        kubectl rollout status deployment/crowdfundx-backend -n crowdfundx-staging --timeout=300s
        kubectl rollout status deployment/crowdfundx-frontend -n crowdfundx-staging --timeout=300s
        
        # Run health checks
        kubectl get pods -n crowdfundx-staging
        kubectl get services -n crowdfundx-staging

    - name: Run integration tests
      run: |
        export KUBECONFIG=kubeconfig
        
        # Get service URLs
        BACKEND_URL=$(kubectl get service crowdfundx-backend-service -n crowdfundx-staging -o jsonpath='{.status.loadBalancer.ingress[0].ip}')
        FRONTEND_URL=$(kubectl get service crowdfundx-frontend-service -n crowdfundx-staging -o jsonpath='{.status.loadBalancer.ingress[0].ip}')
        
        # Run integration tests
        cd integration-tests
        npm ci
        npm test -- --baseUrl=http://$BACKEND_URL:3001

  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: deploy-staging
    if: github.ref == 'refs/heads/main'
    environment: production
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup kubectl
      uses: azure/setup-kubectl@v3
      with:
        version: 'v1.28.0'

    - name: Configure kubectl
      run: |
        echo "${{ secrets.KUBE_CONFIG_PRODUCTION }}" | base64 -d > kubeconfig
        export KUBECONFIG=kubeconfig

    - name: Deploy to production
      run: |
        export KUBECONFIG=kubeconfig
        
        # Create namespace if it doesn't exist
        kubectl create namespace crowdfundx --dry-run=client -o yaml | kubectl apply -f -
        
        # Apply configurations
        envsubst < kubernetes/deployment.yml | kubectl apply -f - -n crowdfundx
        
        # Apply monitoring
        kubectl apply -f kubernetes/monitoring.yml -n crowdfundx
        
        # Wait for deployment
        kubectl rollout status deployment/crowdfundx-backend -n crowdfundx --timeout=600s
        kubectl rollout status deployment/crowdfundx-frontend -n crowdfundx --timeout=600s
        
        # Run health checks
        kubectl get pods -n crowdfundx
        kubectl get services -n crowdfundx

    - name: Run smoke tests
      run: |
        export KUBECONFIG=kubeconfig
        
        # Get service URLs
        BACKEND_URL=$(kubectl get service crowdfundx-backend-service -n crowdfundx -o jsonpath='{.status.loadBalancer.ingress[0].ip}')
        FRONTEND_URL=$(kubectl get service crowdfundx-frontend-service -n crowdfundx -o jsonpath='{.status.loadBalancer.ingress[0].ip}')
        
        # Run smoke tests
        cd smoke-tests
        npm ci
        npm test -- --baseUrl=http://$BACKEND_URL:3001 --frontendUrl=http://$FRONTEND_URL

    - name: Notify deployment success
      uses: 8398a7/action-slack@v3
      with:
        status: success
        channel: '#deployments'
        webhook_url: ${{ secrets.SLACK_WEBHOOK }}
        fields: repo,message,commit,author,action,eventName,ref,workflow

    - name: Notify deployment failure
      if: failure()
      uses: 8398a7/action-slack@v3
      with:
        status: failure
        channel: '#deployments'
        webhook_url: ${{ secrets.SLACK_WEBHOOK }}
        fields: repo,message,commit,author,action,eventName,ref,workflow

  rollback:
    name: Rollback Deployment
    runs-on: ubuntu-latest
    needs: deploy-production
    if: failure() && github.ref == 'refs/heads/main'
    environment: production
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup kubectl
      uses: azure/setup-kubectl@v3
      with:
        version: 'v1.28.0'

    - name: Configure kubectl
      run: |
        echo "${{ secrets.KUBE_CONFIG_PRODUCTION }}" | base64 -d > kubeconfig
        export KUBECONFIG=kubeconfig

    - name: Rollback deployment
      run: |
        export KUBECONFIG=kubeconfig
        
        # Rollback to previous revision
        kubectl rollout undo deployment/crowdfundx-backend -n crowdfundx
        kubectl rollout undo deployment/crowdfundx-frontend -n crowdfundx
        
        # Wait for rollback
        kubectl rollout status deployment/crowdfundx-backend -n crowdfundx --timeout=300s
        kubectl rollout status deployment/crowdfundx-frontend -n crowdfundx --timeout=300s
        
        # Verify rollback
        kubectl get pods -n crowdfundx
        kubectl get services -n crowdfundx

    - name: Notify rollback
      uses: 8398a7/action-slack@v3
      with:
        status: custom
        custom_payload: |
          {
            text: "🚨 Deployment rolled back for ${{ github.repository }}",
            attachments: [{
              color: 'warning',
              fields: [{
                title: 'Repository',
                value: '${{ github.repository }}',
                short: true
              }, {
                title: 'Commit',
                value: '${{ github.sha }}',
                short: true
              }]
            }]
          }
        channel: '#deployments'
        webhook_url: ${{ secrets.SLACK_WEBHOOK }}
